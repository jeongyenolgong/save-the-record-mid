<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Save the Record - 중등용</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'Galmuri11';src:url('fonts/Galmuri11.woff2') format('woff2');font-display:swap;}
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#FFFFFF;--accent:#FFD700;--accent2:#FFC107;--text:#222222;--red:#E53935;--green:#43A047;--gray:#BDBDBD;--light:#F5F5F5;--border:#222222;}
body{font-family:'Galmuri11',monospace;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.pixel-font{font-family:'Press Start 2P',monospace;}
.container{max-width:660px;margin:0 auto;padding:20px 18px;min-height:100vh;}
button{font-family:'Galmuri11',monospace;cursor:pointer;border:3px solid var(--border);background:var(--bg);color:var(--text);padding:11px 18px;font-size:16px;transition:background 0.1s;}
button:hover{background:var(--accent);}
button:active{transform:translate(2px,2px);}
input{font-family:'Galmuri11',monospace;border:3px solid var(--border);padding:8px 12px;font-size:16px;outline:none;background:var(--bg);}
input:focus{border-color:var(--accent);}
.hidden{display:none!important;}

/* LOGIN */
#login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;gap:20px;}
#login h1{font-family:'Press Start 2P',monospace;font-size:clamp(18px,5vw,32px);letter-spacing:2px;line-height:1.7;margin:0;}
/* 족자(행잉 스크롤) 타이틀 박스 — 한지(크림) 바탕 + 도트 디자인 */
.title-scroll{display:inline-block;position:relative;padding-top:13px;}
/* 매다는 끈/고리 */
.title-scroll::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:30px;height:15px;border:3px solid #6d4c41;border-bottom:none;border-radius:16px 16px 0 0;}
/* 족자 봉 — 도트(픽셀) 음영 */
.scroll-rod{position:relative;height:18px;width:calc(100% + 36px);margin-left:-18px;border:3px solid #222;z-index:2;
  background:linear-gradient(#FFE9A8 0 5px,#FFD24A 5px 12px,#E0950C 12px 18px);
  box-shadow:inset 4px 0 0 #FFE9A8, inset -4px 0 0 #C57E00;}
/* 봉 양끝 나무 축 */
.scroll-rod::before,.scroll-rod::after{content:"";position:absolute;top:50%;width:16px;height:30px;border:3px solid #222;transform:translateY(-50%);
  background:linear-gradient(#8d6e63 0 50%,#5d4037 50% 100%);}
.scroll-rod::before{left:-17px;}
.scroll-rod::after{right:-17px;}
/* 한지 종이 + 도트 그리드 */
.scroll-body{border:3px solid #222;border-top:none;border-bottom:none;padding:24px 28px;
  background-color:#FBF1D6;
  background-image:radial-gradient(#e6d4a0 1.5px,transparent 1.5px);
  background-size:9px 9px;
  box-shadow:inset 0 0 0 2px #E7D3A0;}
/* 2색 이퀄라이저 타이틀 (골드 계열) */
.neon-title .nc{display:inline-block;animation:neonEq 2.4s ease-in-out infinite;will-change:transform;}
.neon-title .sp{display:inline-block;width:.5em;}
@keyframes neonEq{
  0%,100%{color:#6B3F00;text-shadow:0 1px 0 #fff7df;transform:translateY(0);}
  50%{color:#F2A100;text-shadow:0 1px 0 #fff7df,0 0 6px rgba(242,161,0,.4);transform:translateY(-8px);}
}
#login .subtitle{font-size:20px;color:#555;margin-bottom:16px;overflow:hidden;white-space:nowrap;width:100%;max-width:400px;}
#login .subtitle .marquee{display:inline-block;animation:marquee 9s linear infinite;}
@keyframes marquee{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
#login input{width:260px;text-align:center;font-size:20px;}
#login .error{color:var(--red);font-size:14px;min-height:20px;}
#login button{font-size:18px;padding:13px 36px;background:var(--accent);font-weight:bold;}
.cursor-blink::after{content:'_';animation:blink 0.7s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* TOP BAR */
.top-bar{position:sticky;top:0;z-index:200;background:var(--bg);margin:-20px -18px 16px;padding:14px 18px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid var(--border);flex-wrap:wrap;gap:10px;}
.top-bar .level{font-size:15px;display:inline-flex;align-items:baseline;gap:6px;}
.top-bar .level .lv-num{font-family:'Press Start 2P',monospace;font-size:12px;color:#E0950C;}
.top-bar .level .lv-name{font-weight:bold;color:#6B3F00;}
.back-btn{font-size:15px;padding:9px 16px;font-weight:bold;background:var(--bg);box-shadow:3px 3px 0 rgba(0,0,0,.22);}
.back-btn:active{transform:translate(3px,3px);box-shadow:0 0 0 rgba(0,0,0,0);}
.btn-gold{background:var(--accent);}
.btn-gold:hover{background:var(--accent2);}
.top-info{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;}
.player-name{font-weight:bold;font-size:15px;color:var(--text);}

/* CATEGORIES */
.greeting{font-size:18px;margin-bottom:18px;padding:14px;border:3px solid var(--accent);background:#FFFDE7;}
.greet-led{display:flex;align-items:stretch;margin:0 0 18px;min-height:50px;border:3px solid var(--border);background:#222;box-shadow:3px 3px 0 rgba(0,0,0,.25);}
.greet-led .track{flex:1;overflow:hidden;white-space:nowrap;display:flex;align-items:center;padding:0 14px;}
.greet-led .run{display:inline-block;animation:marquee 12s linear infinite;font-weight:bold;font-size:19px;color:#FFD24A;text-shadow:0 0 6px rgba(255,210,74,.5);letter-spacing:1px;}

/* BADGES (플로팅 스트립 — 태블릿: 콘텐츠 좌측 여백 / 폰: 하단 가로) */
.badge-float{position:fixed;top:50%;transform:translateY(-50%);left:max(8px,calc(50% - 330px - 56px));display:flex;flex-direction:column;gap:12px;z-index:500;}
.bf-item{cursor:pointer;line-height:0;}
.bf-img{width:48px;height:48px;image-rendering:pixelated;transition:transform .1s;}
.bf-item:hover .bf-img{transform:scale(1.08);}
.bf-item.locked .bf-img{filter:grayscale(1) brightness(1.15) opacity(0.5);}
/* 퀴즈 도전 가능 = 흑백 + 골드 링 깜빡임 */
.bf-item.ready{position:relative;}
.bf-item.ready .bf-img{filter:grayscale(1) brightness(1.05);}
.bf-item.ready::before{content:"";position:absolute;inset:-4px;border:3px solid var(--accent);border-radius:50%;animation:bfPulse 1.1s ease-in-out infinite;pointer-events:none;}
@keyframes bfPulse{0%,100%{transform:scale(.9);opacity:.5;}50%{transform:scale(1.08);opacity:1;}}
@media(max-width:767px){.badge-float{top:auto;bottom:8px;left:50%;transform:translateX(-50%);flex-direction:row;gap:10px;}}

/* REPORT */
.report-era{font-size:15px;font-weight:bold;color:#6B3F00;}
/* 족자(scroll) */
.scroll-report{position:relative;filter:drop-shadow(4px 5px 0 rgba(0,0,0,.22));margin-bottom:6px;}
.sr-rod{position:relative;height:18px;border:3px solid #222;z-index:3;background:linear-gradient(#FFE9A8 0 5px,#FFD24A 5px 12px,#E0950C 12px 18px);box-shadow:inset 5px 0 0 #FFE9A8, inset -5px 0 0 #C57E00;}
.sr-rod::before,.sr-rod::after{content:"";position:absolute;top:50%;width:16px;height:30px;border:3px solid #222;transform:translateY(-50%);background:linear-gradient(#8d6e63 0 50%,#5d4037 50% 100%);}
.sr-rod::before{left:-15px;} .sr-rod::after{right:-15px;}
.sr-body{border:3px solid #222;border-top:none;border-bottom:none;padding:16px 16px 20px;background-color:#FBF1D6;background-image:radial-gradient(#e8d8a8 1.3px,transparent 1.3px);background-size:11px 11px;box-shadow:inset 0 0 0 2px #E7D3A0;}
.sr-img{width:100%;height:200px;object-fit:contain;border:3px solid #222;background:#fff;box-shadow:3px 3px 0 rgba(0,0,0,.18);display:block;cursor:zoom-in;}
.sr-title{font-size:21px;font-weight:bold;line-height:1.3;margin-top:12px;}
.sr-meta{font-size:13px;color:#6B3F00;margin-top:4px;font-weight:bold;}
.sr-desc{font-size:15px;line-height:1.7;color:#3a2e1a;margin-top:10px;background:rgba(255,255,255,.62);border:2px solid #E7D3A0;padding:10px 12px;}
.sr-divider{height:3px;background:repeating-linear-gradient(90deg,#C9B582 0 7px,transparent 7px 12px);margin:16px 0;}
.inv-list{display:flex;flex-direction:column;}
.sec{position:relative;background:rgba(255,255,255,.68);border:3px solid #222;border-left-width:7px;box-shadow:3px 3px 0 rgba(0,0,0,.15);padding:12px 13px;margin-bottom:12px;}
.sec-key{display:inline-block;font-size:12px;font-weight:bold;color:#222;padding:2px 9px;margin-bottom:7px;border:2px solid #222;}
.sec-seal{position:absolute;top:11px;right:12px;width:30px;height:30px;border:3px solid #C0392B;color:#C0392B;font-weight:bold;text-align:center;line-height:24px;font-size:16px;box-shadow:2px 2px 0 rgba(0,0,0,.18);background:#fff;}
.sec-sub{font-weight:bold;font-size:16px;margin-bottom:6px;padding-right:38px;}
.sec-content{font-size:15px;line-height:1.7;color:#2c2418;margin-top:6px;white-space:pre-wrap;}
.sec-extra{margin-top:10px;padding:10px 12px;border:2px dashed #b9a36a;background:#FFFBEF;font-size:14px;line-height:1.6;color:#4a3c20;}
.sec-extra .ex-title{font-weight:bold;font-size:12px;margin-bottom:3px;}
.locked-msg{font-size:13px;color:#8a7a55;margin-bottom:9px;}
.code-input-area{display:flex;gap:8px;align-items:center;}
.digit-box{width:48px;height:56px;text-align:center;font-size:18px;line-height:1;font-family:'Press Start 2P',monospace;border:3px solid var(--border);background:#fff;box-shadow:2px 2px 0 rgba(0,0,0,.18);}
.digit-box:focus{border-color:var(--accent2);background:#FFFDF0;outline:none;}
.code-submit{padding:10px 15px;font-size:15px;background:var(--accent);font-weight:bold;border:3px solid var(--border);box-shadow:2px 2px 0 rgba(0,0,0,.2);}
.code-submit:active{transform:translate(2px,2px);box-shadow:none;}
.code-error{color:var(--red);font-size:12px;font-weight:bold;margin-top:7px;min-height:16px;}

/* TOAST */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);padding:13px 28px;border:3px solid var(--border);background:var(--accent);color:#222;font-weight:bold;font-size:15px;z-index:1000;animation:toastIn .26s cubic-bezier(.2,.8,.3,1.2);max-width:90vw;text-align:center;box-shadow:3px 3px 0 rgba(0,0,0,.22);}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-50%) scale(.88);}to{opacity:1;transform:translate(-50%,-50%) scale(1);}}

/* SHAKE */
@keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-6px);}40%,80%{transform:translateX(6px);}}
.shake{animation:shake 0.4s;}

/* ===== UNIFIED MODAL (overlay·complete·퀴즈 공통) ===== */
.overlay,.complete-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:2000;animation:modalFade .2s ease;padding:18px;}
.complete-overlay{z-index:2500;}  /* 완성 팝업은 배지·레벨 팝업 위에 표시 */
@keyframes modalFade{from{opacity:0;}to{opacity:1;}}
.overlay-box,.complete-box{background:var(--bg);border:4px solid var(--border);box-shadow:inset 0 0 0 3px var(--accent),6px 6px 0 rgba(0,0,0,.28);padding:28px 28px 24px;text-align:center;width:460px;max-width:90vw;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column;align-items:center;animation:modalPop .26s cubic-bezier(.2,.8,.3,1.2);}
@keyframes modalPop{from{opacity:0;transform:scale(.9) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
.overlay-box h2,.complete-box h2{font-family:'Galmuri11',monospace;font-weight:bold;font-size:22px;color:var(--accent2);margin:0 0 14px;line-height:1.4;}
.overlay-box p{font-size:15px;line-height:1.7;margin:0 0 22px;min-height:51px;}  /* 2줄 고정 → 배지·레벨 확인버튼 위치 동일 */
.overlay-box button,.complete-box button{font-size:14px;padding:10px 26px;background:var(--accent);font-weight:bold;}  /* 확인 버튼 골드 통일 */
/* 팝업 미디어 슬롯(배지·레벨 공통 높이) */
.overlay-media{height:132px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
.overlay-img{width:96px;height:auto;image-rendering:pixelated;transform-origin:center;animation:badgeBeat .8s ease-in-out infinite;}  /* 배지: 부드러운 두근두근 */
@keyframes badgeBeat{0%,100%{transform:scale(1);}50%{transform:scale(1.10);}}
@keyframes charSwap{0%,50%{opacity:0;}50.01%,100%{opacity:1;}}
/* 레벨업: 이전→현재 단계 변화 (라벨 박스 없는 텍스트) */
.level-up{display:flex;align-items:flex-start;justify-content:center;gap:12px;}
.lu-col{display:flex;flex-direction:column;align-items:center;gap:7px;}
.lu-pic{height:92px;display:flex;align-items:flex-end;justify-content:center;}    /* 캐릭터 영역 높이 고정 → 라벨 같은 줄 정렬 */
.lu-prev img{width:52px;height:auto;image-rendering:pixelated;filter:grayscale(.5) opacity(.5);display:block;}
.lu-cur{position:relative;width:74px;height:92px;}
.lu-cur img{position:absolute;left:0;bottom:0;width:74px;height:auto;image-rendering:pixelated;}
.lu-cur .b{opacity:0;animation:charSwap .8s steps(1,end) infinite;}
.lu-arrow{height:92px;display:flex;align-items:center;font-size:18px;color:var(--accent2);line-height:1;}  /* 캐릭터 중앙 정렬 */
.lu-lvname{font-family:'Galmuri11',monospace;font-weight:bold;font-size:11px;line-height:1.2;white-space:nowrap;}
.lu-lvname.old{color:#aaa;}
.lu-lvname.new{color:#6B3F00;}
/* 레벨업 팝업: 레벨(타이틀) 위, 캐릭터(미디어) 아래로 순서 재배치 */
.overlay-box.lv #overlayTitle{order:1;}
.overlay-box.lv #overlayMedia{order:2;}
.overlay-box.lv #overlayMsg{order:3;}
.overlay-box.lv button{order:4;}

/* COMPLETE OVERLAY (전용 콘텐츠 — 배지 팝업과 같은 리듬: 타이틀→중앙사진→이름→메타→출처→버튼) */
.complete-media{display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
.complete-pic{position:relative;display:inline-block;line-height:0;}
.complete-pic img{max-width:100%;max-height:180px;object-fit:contain;border:3px solid var(--border);background:#fff;}
.complete-seal{position:absolute;top:6px;right:6px;width:42px;height:42px;font-family:'Galmuri11',monospace;font-weight:bold;font-size:25px;line-height:1;color:#C0392B;border:3px solid #C0392B;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:2px 2px 0 rgba(0,0,0,.18);}
.report-header .report-img{cursor:zoom-in;}
.zoomable{position:relative;}
.zoom-hint{position:absolute;right:8px;bottom:8px;background:rgba(0,0,0,0.6);color:#fff;font-size:11px;padding:3px 8px;border-radius:12px;pointer-events:none;}
.img-lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:3500;cursor:zoom-out;padding:24px;}
.img-lightbox img{max-width:96vw;max-height:84vh;object-fit:contain;box-shadow:0 4px 30px rgba(0,0,0,0.6);border-radius:4px;}
.img-lightbox .lb-cap{color:#eee;font-size:13px;margin-top:14px;text-align:center;max-width:90vw;line-height:1.5;}
.img-lightbox .lb-close{position:absolute;top:18px;right:22px;color:#fff;font-size:30px;line-height:1;background:none;border:none;cursor:pointer;}
.complete-name{font-size:20px;font-weight:bold;margin-bottom:5px;}
.complete-meta{font-size:14px;color:#666;margin-bottom:10px;}
.complete-source{font-size:10px;color:var(--gray);margin-bottom:16px;line-height:1.4;}
.complete-box button{font-size:14px;padding:10px 26px;background:var(--accent);font-weight:bold;}

/* STARS */
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3000;}
.star{position:absolute;width:4px;height:4px;animation:pxTwinkle 1.1s steps(5,end) forwards;}
.star::before{content:"";position:absolute;inset:0;background:currentColor;box-shadow:0 -6px 0 currentColor,0 6px 0 currentColor,-6px 0 0 currentColor,6px 0 0 currentColor;}
@keyframes pxTwinkle{0%{transform:scale(0);opacity:0;}30%{transform:scale(1.4);opacity:1;}65%{transform:scale(1);opacity:1;}100%{transform:scale(.5) translateY(-34px);opacity:0;}}


/* SCROLLBAR */
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-track{background:var(--light);}
::-webkit-scrollbar-thumb{background:var(--gray);border:2px solid var(--light);}

/* TIMELINE */
.timeline-v{position:relative;padding-left:70px;padding-top:6px;padding-bottom:6px;margin-bottom:16px;}
.timeline-v::before{content:'';position:absolute;left:52px;top:0;bottom:0;width:3px;background:var(--border);}
/* 시대 족자 (한지+골드봉, 왼쪽·선 약간 침범, 픽셀 그림자) */
.era-scroll{position:relative;margin:24px 0 14px -70px;width:66px;z-index:1;filter:drop-shadow(3px 3px 0 rgba(0,0,0,.22));}
.era-rod{position:relative;height:13px;border:3px solid #222;z-index:2;background:linear-gradient(#FFE9A8 0 4px,#FFD24A 4px 8px,#E0950C 8px 13px);box-shadow:inset 4px 0 0 #FFE9A8, inset -4px 0 0 #C57E00;}
.era-rod::before,.era-rod::after{content:"";position:absolute;top:50%;width:10px;height:19px;border:3px solid #222;transform:translateY(-50%);background:linear-gradient(#8d6e63 0 50%,#5d4037 50% 100%);}
.era-rod::before{left:-11px;} .era-rod::after{right:-11px;}
.era-paper{border:3px solid #222;border-top:none;border-bottom:none;padding:8px 6px;text-align:center;background-color:#FBF1D6;background-image:radial-gradient(#e6d4a0 1.5px,transparent 1.5px);background-size:9px 9px;box-shadow:inset 0 0 0 2px #E7D3A0;}
.era-name{font-weight:bold;color:#6B3F00;font-size:15px;}
.tl-item{position:relative;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
/* 연도 배지 — 한지 배경 + 픽셀 그림자 */
.tl-year{position:absolute;left:-70px;width:54px;text-align:center;font-family:'Press Start 2P',monospace;font-size:9px;color:#6B3F00;border:3px solid var(--border);padding:6px 2px;line-height:1.3;background-color:#FBF1D6;background-image:radial-gradient(#e6d4a0 1.5px,transparent 1.5px);background-size:9px 9px;box-shadow:3px 3px 0 rgba(0,0,0,.22), inset 0 0 0 2px #E7D3A0;}
.tl-prog{flex:0 0 auto;font-size:14px;font-weight:bold;color:#555;white-space:nowrap;}
/* 완료 도장 — 빨강 단색 完 + 픽셀 그림자 */
.tl-seal{flex:0 0 auto;width:34px;height:34px;border:3px solid #C0392B;display:flex;align-items:center;justify-content:center;box-shadow:2px 2px 0 rgba(0,0,0,.18);}
.tl-seal .ch{font-family:'Galmuri11',monospace;font-weight:bold;font-size:21px;line-height:1;color:#C0392B;}
.tl-card{flex:1;border:4px solid var(--border);box-shadow:4px 4px 0 rgba(0,0,0,.22);padding:13px 15px;background:var(--bg);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px;transition:background 0.1s;}
.tl-card:hover{background:var(--accent);}
.tl-card.done{background-color:#FBF1D6;background-image:radial-gradient(#e6d4a0 1.5px,transparent 1.5px);background-size:9px 9px;box-shadow:4px 4px 0 rgba(0,0,0,.22), inset 0 0 0 2px #E7D3A0;}
.tl-card.done .h-meta{color:#8a6d3b;}
.tl-card .info{flex:1;}
.tl-card .h-name{font-weight:bold;font-size:16px;}
.tl-card .h-meta{font-size:12px;color:#666;margin-top:3px;}

/* TUTORIAL */
#tutorial{display:flex;flex-direction:column;min-height:100vh;padding:18px 0;}
.tut-stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px;padding:10px 6px;}
.tut-char{position:relative;width:104px;height:128px;margin:0 auto;}
.tut-char img{position:absolute;left:0;top:0;width:104px;height:auto;image-rendering:pixelated;}
.tut-char .b{opacity:0;animation:charSwap .8s steps(1,end) infinite;}
.tut-title{font-family:'Press Start 2P',monospace;font-size:14px;line-height:1.7;color:var(--accent2);letter-spacing:1px;}
.tut-title.ko{font-family:'Galmuri11',monospace;font-weight:bold;font-size:21px;color:var(--text);letter-spacing:0;}
.tut-title .nm{color:var(--text);}
.tut-title .lv{color:var(--accent2);}
.tut-body{font-size:16px;line-height:1.8;color:#444;max-width:430px;}
.tut-body b{color:var(--accent2);}
.tut-eras{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.tut-era{border:3px solid var(--border);padding:10px 14px;font-size:15px;font-weight:bold;background:var(--light);}
.tut-secs{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:460px;}
.tut-sec{border:3px solid var(--border);padding:9px 11px;text-align:left;background:var(--bg);}
.tut-sec .k{font-weight:bold;font-size:14px;}
.tut-sec .s{font-size:11px;color:#777;margin-top:2px;}
.tut-codemock{display:flex;flex-direction:column;align-items:center;gap:9px;border:3px dashed var(--gray);padding:16px 18px;background:var(--light);}
.tut-lock{font-size:14px;color:#888;}
.tut-digits{display:flex;gap:8px;align-items:center;}
.tut-digit{width:42px;height:50px;border:3px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;font-size:18px;background:var(--bg);}
.tut-mockbtn{border:3px solid var(--border);background:var(--accent);font-weight:bold;padding:8px 14px;font-size:14px;font-family:'Galmuri11',monospace;}
.tut-arrow{font-size:20px;color:var(--accent2);line-height:1;}
.tut-done-row{display:flex;align-items:center;gap:8px;font-size:15px;color:var(--green);font-weight:bold;}
.tut-icons{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;align-items:flex-end;}
.tut-icons.levels img{width:40px;height:auto;image-rendering:pixelated;}
.tut-icons.badges img{width:48px;height:auto;image-rendering:pixelated;}
.tut-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 4px 4px;gap:10px;border-top:3px solid var(--border);}
.tut-dots{display:flex;gap:7px;justify-content:center;flex:1;}
.tut-dot{width:9px;height:9px;border:2px solid var(--border);background:var(--bg);border-radius:50%;}
.tut-dot.on{background:var(--accent);}
.tut-nav button{font-size:15px;padding:11px 20px;}
.tut-nav .next{background:var(--accent);font-weight:bold;}
.tut-nav .prev:disabled{opacity:.3;cursor:default;}

/* QUIZ SCREEN (배지 획득 퀴즈 — 족자 본문 안) */
.quiz-q{position:relative;background:rgba(255,255,255,.74);border:3px solid #222;border-left-width:7px;box-shadow:3px 3px 0 rgba(0,0,0,.15);padding:12px 13px 13px;margin-bottom:14px;}
.quiz-q:last-child{margin-bottom:0;}
.quiz-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px;}
.quiz-num{font-family:'Press Start 2P',monospace;font-size:10px;color:#222;border:2px solid #222;padding:4px 8px;}
.quiz-confirm{font-family:'Galmuri11',monospace;font-size:13px;padding:7px 18px;background:var(--accent);font-weight:bold;border:3px solid var(--border);box-shadow:2px 2px 0 rgba(0,0,0,.2);}
.quiz-confirm:active{transform:translate(2px,2px);box-shadow:none;}
.quiz-text{font-size:15px;font-weight:bold;line-height:1.5;margin-bottom:12px;color:#2c2418;}
.quiz-photo{position:relative;width:100%;max-width:280px;margin:0 auto 12px;}
.quiz-photo img{width:100%;height:180px;object-fit:contain;border:3px solid var(--border);background:#fff;cursor:zoom-in;display:block;box-shadow:2px 2px 0 rgba(0,0,0,.18);}
.quiz-opt{position:relative;display:block;width:100%;text-align:left;border:3px solid var(--border);background:#fff;padding:10px 12px;font-size:14px;margin-bottom:8px;line-height:1.4;box-shadow:2px 2px 0 rgba(0,0,0,.12);}
.quiz-opt:last-child{margin-bottom:0;}
.quiz-opt:hover{background:#FFFDE7;}
.quiz-opt.sel{background:var(--accent);font-weight:bold;}
/* 정답 확정 = 完 도장 + 한지 */
.quiz-opt.correct{background-color:#FBF1D6;background-image:radial-gradient(#e6d4a0 1.4px,transparent 1.4px);background-size:9px 9px;border-color:#C57E00;font-weight:bold;box-shadow:inset 0 0 0 2px #E7D3A0,2px 2px 0 rgba(0,0,0,.15);padding-right:44px;}
.quiz-opt .qseal{position:absolute;top:50%;right:8px;transform:translateY(-50%);width:28px;height:28px;border:3px solid #C0392B;color:#C0392B;font-weight:bold;font-size:16px;display:flex;align-items:center;justify-content:center;background:#fff;box-shadow:1px 1px 0 rgba(0,0,0,.2);}
.quiz-opt:disabled{cursor:default;}
.quiz-opt:disabled:not(.correct){opacity:.4;box-shadow:none;}
</style>
</head>
<body>

<script>
// === GAME DATA ===
let GAME_DATA = [];  // content.json 에서 로드

// 아래 설정값은 config.json(엑셀 levels/badges/sections 시트)에서 로드 — applyConfig() 참조.
let CATEGORIES = [];   // 시대별 뱃지 (badges type=category)
let INV_LABELS = [];   // 6개 조사 항목 (sections)
let LEVELS = [];       // 레벨 단계 (levels)
let GLOBAL_BADGE = {emoji:"", name:"", desc:""};  // 전체 완주 뱃지 (badges type=global)
let QUIZZES = [];  // 배지 획득 퀴즈 (config.quizzes — 엑셀 quizzes 시트)
let LABELS = {connectionTitle:"추가 정보", codePrompt:"코드를 입력하세요", codeSubmit:"확인",
  toastSave:"기록 저장 성공!", completeTitle:"기록 완성!", completeMeta:"{country} · UNESCO {year}년 등재",
  completeSourceFallback:"사진 출처 확인 중", levelUpNext:"축하합니다! 다음은 '{next}'에 도전하세요!",
  levelUpMax:"축하합니다! 최고 등급에 도달했어요!", badgeLocked:"아직 획득하지 못한 배지예요.",
  codeWrong:"코드가 틀렸습니다.", codeIncomplete:"3자리를 모두 입력하세요.",
  quizTitle:"배지 획득 퀴즈", quizGuide:"타임라인에서 해당 기록유산을 다시 확인한 뒤 도전하세요!"};  // UI 문구 (labels 시트) — fallback 기본값
const SEC_COLORS = ["#5BB0AE","#FFD23F","#7FBF63","#E88585","#7CACE6","#BBA0E0"];  // 6항목 색(순서: 생산배경·생산방법·생존·가치·보존·접근, PPT 추출)

function applyConfig(cfg){
  LEVELS = (cfg.levels||[]).map(l=>({min:l.min, name:l.name, icon:l.icon||"", iconB:l.icon_b||""}));
  INV_LABELS = (cfg.sections||[]).map(s=>({key:s.key, sub:s.sub}));
  CATEGORIES = (cfg.badges||[]).filter(b=>b.type==="category")
    .map(b=>({key:b.key, badge:(b.emoji?b.emoji+" ":"")+b.name, name:b.name, desc:b.desc, icon:b.icon||""}));
  const g = (cfg.badges||[]).find(b=>b.type==="global");
  if(g) GLOBAL_BADGE = {emoji:g.emoji, name:g.name, desc:g.desc, icon:g.icon||""};
  if(cfg.labels) LABELS = Object.assign({}, LABELS, cfg.labels);
  QUIZZES = cfg.quizzes || [];
}

// === STATE ===
let state = {completed:{}, loggedIn:false};
let currentCategory = "";
let currentHeritage = null;

function loadState(){
  try{
    const s = localStorage.getItem("save_the_record_mid_state");
    if(s) state = JSON.parse(s);
  }catch(e){}
}
function saveState(){
  localStorage.setItem("save_the_record_mid_state", JSON.stringify(state));
}

function markItemCompleted(no, key){
  if(!state.completed[no]) state.completed[no] = {};
  state.completed[no][key] = true;
  saveState();
}

function isItemCompleted(no, key){
  return !!(state.completed[no] && state.completed[no][key]);
}

function getCompletedItems(no){
  if(!state.completed[no]) return [];
  return Object.keys(state.completed[no]);
}

// 진행개수(N/6): 웹제공 등 이미 채워진 정보는 채워진 것으로, 카드 항목은 입력 완료분만 카운트
function getFilledCount(d){
  let n = 0;
  for(const k in d.items){
    if(d.items[k].method !== "카드" || isItemCompleted(d.no, k)) n++;
  }
  return n;
}

function isHeritageComplete(no){
  return getCompletedItems(no).length >= 6;
}

function getCompletedHeritageCount(){
  let c = 0;
  GAME_DATA.forEach(d=>{if(isHeritageComplete(d.no)) c++;});
  return c;
}

function getLevel(){
  const count = getCompletedHeritageCount();
  let lvl = 1;
  for(let i = LEVELS.length - 1; i >= 0; i--){
    if(count >= LEVELS[i].min){lvl = i + 1; break;}
  }
  return lvl;
}

function getLevelName(){
  return LEVELS[getLevel()-1].name;
}

function getCatItems(catKey){
  return GAME_DATA.filter(d => d.category === catKey);
}

function isCatComplete(catKey){
  const items = getCatItems(catKey);
  return items.length > 0 && items.every(d => isHeritageComplete(d.no));
}

// === UI HELPERS ===
// labels 템플릿: "{key}" → vars[key] 치환 (문구는 config.json labels 시트에서 관리)
function lbl(key, vars){
  const s = LABELS[key] || "";
  return vars ? s.replace(/\{(\w+)\}/g, (m,k)=> (vars[k]!=null ? vars[k] : "")) : s;
}
function showToast(msg, type, dur){
  const t = document.createElement("div");
  t.className = "toast " + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), dur || 2500);
}

let overlayQueue = [];
// kind: "badge"(기본, images/badges/, 두근두근 펄스) | "level"(images/levels/, 2프레임 icon+iconB)
function showOverlay(title, msg, icon, kind, iconB, opts){
  const it = {title:title, msg:msg, icon:icon, kind:kind||"badge", iconB:iconB||""};
  if(opts) Object.assign(it, opts);  // 레벨업: prevIcon·prevName·curName 등 추가 데이터
  overlayQueue.push(it);  // 동시 획득 시 순차 표시
  if(document.getElementById("overlay").classList.contains("hidden")) renderOverlay();
}
function renderOverlay(){
  const it = overlayQueue[0];
  if(!it) return;
  const media = document.getElementById("overlayMedia");
  const ovBox = document.querySelector("#overlay .overlay-box");
  if(ovBox) ovBox.classList.toggle("lv", it.kind === "level");  // 레벨업: 레벨(타이틀) 위, 캐릭터 아래로 순서 재배치
  if(it.kind === "level" && it.icon){     // 레벨업: 이전→현재 단계 변화(이전 캐릭터 흐림 → 현재 캐릭터 2프레임)
    const prevCol = it.prevIcon
      ? '<div class="lu-col"><div class="lu-pic"><div class="lu-prev"><img src="images/levels/'+it.prevIcon+'" alt=""></div></div><div class="lu-lvname old">'+(it.prevName||"")+'</div></div><div class="lu-arrow">→</div>'
      : '';
    media.innerHTML = '<div class="level-up">' + prevCol
      + '<div class="lu-col"><div class="lu-pic"><div class="lu-cur"><img class="a" src="images/levels/'+it.icon+'" alt="">'
      + (it.iconB ? '<img class="b" src="images/levels/'+it.iconB+'" alt="">' : '')
      + '</div></div><div class="lu-lvname new">'+(it.curName||"")+'</div></div></div>';
    media.style.display = "";
  } else if(it.icon){                     // 배지: 단일 이미지 + 두근두근 펄스
    media.innerHTML = '<img class="overlay-img" src="images/badges/'+it.icon+'" alt="">';
    media.style.display = "";
  } else { media.innerHTML = ""; media.style.display = "none"; }
  document.getElementById("overlayTitle").textContent = it.title;
  // 문장별 줄바꿈 (. ! ? 뒤에서 끊기)
  const safe = (it.msg||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  document.getElementById("overlayMsg").innerHTML = safe.replace(/([.!?])\s+/g, "$1<br>");
  document.getElementById("overlay").classList.remove("hidden");
}

function hideOverlay(){
  document.getElementById("overlay").classList.add("hidden");
  overlayQueue.shift();
  if(overlayQueue.length) setTimeout(renderOverlay, 300);
}

function spawnStars(count){
  const c = document.getElementById("starsContainer");
  c.classList.remove("hidden");
  c.innerHTML = "";
  const PAL = ["#FFD700","#FFC107","#FF8F00","#E53935","#43A047","#4A78C8"];
  for(let i = 0; i < count; i++){
    const s = document.createElement("div");
    s.className = "star";
    s.style.left = (Math.random()*86+7)+"%";
    s.style.top = (Math.random()*60+12)+"%";
    s.style.color = PAL[Math.floor(Math.random()*PAL.length)];
    s.style.animationDelay = (Math.random()*1.2)+"s";
    c.appendChild(s);
  }
  setTimeout(()=>{c.classList.add("hidden");c.innerHTML="";}, 2600);
}


// === SCREENS ===
function hideAll(){
  ["login","tutorial","categories","report","result","quiz"].forEach(id=>{
    document.getElementById(id).classList.add("hidden");
  });
}

// === TUTORIAL (로그인 → 타임라인 사이, 매 로그인마다 표시) ===
let tutStep = 0;
let TUT_STEPS = [];

function buildTutorialSteps(){
  const name = getPlayerName() || "기록관";
  const lv1 = LEVELS[0] || {};
  const charHtml = '<div class="tut-char"><img class="a" src="images/levels/'+(lv1.icon||"level1.png")+'" alt="">'
    + (lv1.iconB ? '<img class="b" src="images/levels/'+lv1.iconB+'" alt="">' : '') + '</div>';
  const eraChips = CATEGORIES.map(c=>'<span class="tut-era">'+c.badge+'</span>').join("");
  const secGrid = INV_LABELS.map(s=>'<div class="tut-sec"><div class="k">'+s.key+'</div><div class="s">'+s.sub+'</div></div>').join("");
  const lvlIcons = LEVELS.map(l=>l.icon?'<img src="images/levels/'+l.icon+'" alt="">':'').join("");
  const badgeIcons = CATEGORIES.map(c=>c.icon?'<img src="images/badges/'+c.icon+'" alt="'+c.name+'">':'').join("")
    + (GLOBAL_BADGE.icon?'<img src="images/badges/'+GLOBAL_BADGE.icon+'" alt="'+GLOBAL_BADGE.name+'">':'');
  const lastName = LEVELS.length ? LEVELS[LEVELS.length-1].name : "기록 레전드";
  const total = GAME_DATA.length;
  const lastLv = LEVELS.length || 6;

  return [
    { html: charHtml
        + '<div class="tut-title ko"><span class="nm">'+name+'</span> <span class="lv">'+(lv1.name||"기록 루키")+'</span>, 반갑습니다!</div>'
        + '<div class="tut-body">지금부터 흩어진 <b>기록을 구하고 저장</b>하는<br>미션을 수행해야 합니다.</div>' },
    { html: charHtml
        + '<div class="tut-title">MISSION</div>'

function showTutorial(){
  hideAll();
  TUT_STEPS = buildTutorialSteps();
  tutStep = 0;
  document.getElementById("tutorial").classList.remove("hidden");
  renderTutorialStep();
}

function renderTutorialStep(){
  const s = TUT_STEPS[tutStep];
  document.getElementById("tutStage").innerHTML = s.html;
  document.getElementById("tutDots").innerHTML =
    TUT_STEPS.map((_,i)=>'<span class="tut-dot'+(i===tutStep?" on":"")+'"></span>').join("");
  document.getElementById("tutPrev").disabled = (tutStep === 0);
  document.getElementById("tutNext").textContent =
    (tutStep === TUT_STEPS.length-1) ? "시작하기 🚀" : "다음";
}

function tutorialNext(){
  if(tutStep < TUT_STEPS.length-1){ tutStep++; renderTutorialStep(); }
  else { startGame(); }
}
function tutorialPrev(){
  if(tutStep > 0){ tutStep--; renderTutorialStep(); }
}
function startGame(){ showCategories(); }

// 이름: 입력 전체 보관(최대 5자), 헤더에는 앞 3글자만 노출.
function getPlayerName(){ return state.playerName || ""; }
function getPlayerNameShort(){ return getPlayerName().slice(0,3); }

function tryLogin(){
  const name = document.getElementById("nameInput").value.trim();
  const code = document.getElementById("codeInput").value.trim();
  if(!name){
    document.getElementById("loginError").textContent = "이름을 입력해주세요.";
    document.getElementById("nameInput").classList.add("shake");
    setTimeout(()=>document.getElementById("nameInput").classList.remove("shake"),400);
    return;
  }
  if(code === "하이러닝"){
    state.loggedIn = true;
    state.playerName = name;
    saveState();
    showTutorial();
  } else {
    document.getElementById("loginError").textContent = "코드가 올바르지 않습니다.";
    document.getElementById("codeInput").classList.add("shake");
    setTimeout(()=>document.getElementById("codeInput").classList.remove("shake"),400);
  }
}

function logout(){
  state.loggedIn = false;
  state.playerName = "";
  saveState();
  hideAll();
  document.getElementById("login").classList.remove("hidden");
  document.getElementById("nameInput").value = "";
  document.getElementById("codeInput").value = "";
  document.getElementById("loginError").textContent = "";
}

  document.getElementById("report").classList.remove("hidden");

function renderInvList(d){
  const list = document.getElementById("invList");
  list.innerHTML = "";

  INV_LABELS.forEach((inv,idx)=>{
    const item = d.items[inv.key];
    if(!item) return;
    let completed = isItemCompleted(d.no, inv.key);
    const isWeb = item.method === "웹제공";
    if(isWeb && !completed){ markItemCompleted(d.no, inv.key); completed = true; } // 웹제공은 열람 시 자동 완료
    const open = isWeb || completed;
    const col = SEC_COLORS[idx] || "#6B3F00";
    const safe = inv.key.replace(/[^a-zA-Z가-힣]/g,"");

    const div = document.createElement("div");
    div.className = "sec";
    div.style.borderLeftColor = col;

    let html = (open ? '<span class="sec-seal">完</span>' : '')
      + '<span class="sec-key" style="background:'+col+'">'+inv.key+'</span>'
      + '<div class="sec-sub">'+inv.sub+'</div>';

    if(open){
      html += '<div class="sec-content" id="content_'+d.no+'_'+safe+'">'+item.content+'</div>';
      if(!isWeb && item.connection){
        html += '<div class="sec-extra" style="border-color:'+col+'"><div class="ex-title" style="color:'+col+'">'+LABELS.connectionTitle+'</div>'+item.connection+'</div>';
      }
    } else {
      html += '<div class="locked-msg">'+LABELS.codePrompt+'</div>';
      html += '<div class="code-input-area">';
      html += '<input class="digit-box" type="tel" maxlength="1" data-no="'+d.no+'" data-key="'+inv.key+'" data-pos="0" oninput="digitInput(this)" onkeydown="digitKeydown(event,this)">';
      html += '<input class="digit-box" type="tel" maxlength="1" data-no="'+d.no+'" data-key="'+inv.key+'" data-pos="1" oninput="digitInput(this)" onkeydown="digitKeydown(event,this)">';
      html += '<input class="digit-box" type="tel" maxlength="1" data-no="'+d.no+'" data-key="'+inv.key+'" data-pos="2" oninput="digitInput(this)" onkeydown="digitKeydown(event,this)">';
      html += '<button class="code-submit" onclick="submitCode('+d.no+',\''+inv.key.replace(/'/g,"\\'")+'\')">'+LABELS.codeSubmit+'</button>';
      html += '</div>';
      html += '<div class="code-error" id="err_'+d.no+'_'+safe+'"></div>';
    }

    div.innerHTML = html;
    list.appendChild(div);
  });

  checkAutoComplete(d);
}

function checkAutoComplete(d){
  const doneCount = getCompletedItems(d.no).length;
  if(doneCount >= 6 && !d._celebrated){
    d._celebrated = true;
    setTimeout(()=>{   // 토스트(1.5s) 후 완성 팝업. 레벨·배지는 완성 팝업을 닫을 때 순차 등장.
      spawnStars(20);
      showCompleteOverlay(d);
    }, 1900);
  }
}

function digitInput(el){
  const v = el.value.replace(/[^0-9]/g,"");
  el.value = v.slice(0,1);
  if(v.length > 0){
    const pos = parseInt(el.dataset.pos);
    const siblings = el.parentElement.querySelectorAll(".digit-box");
    if(pos < 2) siblings[pos+1].focus();
  }
}

function digitKeydown(e, el){
  if(e.key === "Backspace" && el.value === ""){
    const pos = parseInt(el.dataset.pos);
    if(pos > 0){
      const siblings = el.parentElement.querySelectorAll(".digit-box");
      siblings[pos-1].focus();
    }
  }
  if(e.key === "Enter"){
    submitCode(parseInt(el.dataset.no), el.dataset.key);
  }
}

function submitCode(no, key){
  const d = GAME_DATA.find(x=>x.no===no);
  const item = d.items[key];
  const area = document.querySelector('.code-input-area');
  if(!area) return;

  // Find the right code input area
  const allAreas = document.querySelectorAll('.code-input-area');
  let targetArea = null;
  allAreas.forEach(a=>{
    const inputs = a.querySelectorAll('.digit-box');
    if(inputs.length && inputs[0].dataset.no == no && inputs[0].dataset.key === key){
      targetArea = a;
    }
  });
  if(!targetArea) return;

  const digits = targetArea.querySelectorAll(".digit-box");
  const code = Array.from(digits).map(d=>d.value).join("");

  const errId = "err_"+no+"_"+key.replace(/[^a-zA-Z가-힣]/g,"");
  const errEl = document.getElementById(errId);

  if(code.length < 3){
    if(errEl) errEl.textContent = lbl("codeIncomplete");
    return;
  }

  if(code === item.code){
    markItemCompleted(no, key);
    if(errEl) errEl.textContent = "";
    showToast(lbl("toastSave"), "success", 1500);
    spawnStars(20);
    renderInvList(d);   // 완성 시 checkAutoComplete→완성 팝업, 닫으면 레벨·배지 순차 등장
  } else {
    if(errEl) errEl.textContent = lbl("codeWrong");
    targetArea.classList.add("shake");
    setTimeout(()=>targetArea.classList.remove("shake"),400);
    digits.forEach(b=>{ b.value=""; });   // 틀리면 입력 비우고
    if(digits[0]) digits[0].focus();       // 첫 칸 포커스
  }
}

function checkLevelUp(d){
  const prevLevel = state._lastLevel || 1;
  const curLevel = getLevel();
  if(curLevel > prevLevel){
    state._lastLevel = curLevel;
    saveState();
    const cur = LEVELS[curLevel-1], prev = LEVELS[prevLevel-1], next = LEVELS[curLevel];
    const msg = next ? lbl("levelUpNext", {next:next.name}) : lbl("levelUpMax");
    setTimeout(()=>{
      showOverlay("Lv."+curLevel+" "+cur.name, msg, cur.icon, "level", cur.iconB,
        {prevIcon:prev.icon, prevName:prev.name, curName:cur.name});
      spawnStars(20);
    }, 250);
  }
  state._lastLevel = curLevel;
}

function checkBadge(d){
  // 시대 배지: 퀴즈가 있으면 퀴즈 통과(quizPass) 시 지급 — 완성만으로는 지급/팝업 없음(플로팅 배지 링이 '도전 가능' 표시).
  // 퀴즈 없는 시대만 완성 시 자동 지급.
  CATEGORIES.forEach(cat=>{
    if(isCatComplete(cat.key) && !state["badge_"+cat.key] && !quizExists(cat.key)){
      state["badge_"+cat.key] = true;
      saveState();
      setTimeout(()=>{ showOverlay(cat.name, cat.desc, cat.icon); spawnStars(20); }, 250);
    }
  });
  // 올컴플리트: 세 시대 배지 모두 획득 시. 글로벌 퀴즈가 생기면 그때 게이트(현재는 자동 지급).
  const allEarned = CATEGORIES.every(c=>!!state["badge_"+c.key]);
  if(allEarned && !state.badge_global && !quizExists("올컴플리트") && !quizExists("global")){
    state.badge_global = true;
    saveState();
    setTimeout(()=>{ showOverlay(GLOBAL_BADGE.name, GLOBAL_BADGE.desc, GLOBAL_BADGE.icon); spawnStars(20); }, 250);
  }
}

// === QUIZ (배지 획득 퀴즈) ===
let currentQuizEra = "";
let quizPicks = [];

function quizExists(era){ return QUIZZES.some(q=>q.era===era); }
function getEraQuiz(era){ return QUIZZES.filter(q=>q.era===era).slice().sort((a,b)=>a.order-b.order); }
function getQuizSolved(era){
  if(!state.quizSolved) state.quizSolved = {};
  const n = getEraQuiz(era).length;
  if(!state.quizSolved[era] || state.quizSolved[era].length !== n) state.quizSolved[era] = Array(n).fill(false);
  return state.quizSolved[era];
}

function showQuiz(era){
  if(!quizExists(era)) return;
  currentQuizEra = era;
  quizPicks = getEraQuiz(era).map(()=>-1);
  hideAll();
  document.getElementById("quiz").classList.remove("hidden");
  document.getElementById("quizTitle").textContent = lbl("quizTitle");
  document.getElementById("quizGuide").textContent = lbl("quizGuide");
  renderQuiz();
  window.scrollTo(0,0);
}

function renderQuiz(){
  const qs = getEraQuiz(currentQuizEra);
  const body = document.getElementById("quizBody");
  body.innerHTML = "";
  qs.forEach((q,qi)=>{
    const col = SEC_COLORS[qi % SEC_COLORS.length];
    const div = document.createElement("div");
    div.className = "quiz-q"; div.id = "qcard"+qi; div.style.borderLeftColor = col;
    let h = '<div class="quiz-head"><span class="quiz-num" style="background:'+col+'">Q'+(qi+1)+'</span>'
      + '<button class="quiz-confirm" id="qcf'+qi+'" onclick="confirmQuiz('+qi+')">'+lbl("codeSubmit")+'</button></div>'
      + '<div class="quiz-text">'+q.question+'</div>';
    if(q.type === "photo" && q.image){
      h += '<div class="quiz-photo"><img src="images/'+q.image+'.jpg" alt="" onclick="openLightbox(this)"><span class="zoom-hint">🔍 탭하면 크게</span></div>';
    }
    h += (q.options||[]).map((o,oi)=>'<button class="quiz-opt" data-qi="'+qi+'" data-oi="'+oi+'" onclick="pickQuiz('+qi+','+oi+')">'+o+'</button>').join('');
    div.innerHTML = h;
    body.appendChild(div);
  });
  refreshQuiz();
}

function refreshQuiz(){
  const qs = getEraQuiz(currentQuizEra);
  const solved = getQuizSolved(currentQuizEra);
  document.querySelectorAll("#quizBody .quiz-opt").forEach(b=>{
    const qi = +b.dataset.qi, oi = +b.dataset.oi;
    b.className = "quiz-opt"; b.disabled = false;
    const old = b.querySelector(".qseal"); if(old) old.remove();
    if(solved[qi]){
      b.disabled = true;
      if(oi === qs[qi].answer-1){ b.classList.add("correct"); const s=document.createElement("span"); s.className="qseal"; s.textContent="完"; b.appendChild(s); }
      return;
    }
    if(quizPicks[qi] === oi) b.classList.add("sel");
  });
  qs.forEach((q,qi)=>{ const cf=document.getElementById("qcf"+qi); if(cf) cf.style.display = solved[qi] ? "none" : ""; });
}

function pickQuiz(qi, oi){
  if(getQuizSolved(currentQuizEra)[qi]) return;
  quizPicks[qi] = oi;
  refreshQuiz();
}

function quizShake(qi){
  const c = document.getElementById("qcard"+qi);
  if(c){ c.classList.remove("shake"); void c.offsetWidth; c.classList.add("shake"); setTimeout(()=>c.classList.remove("shake"), 420); }
}

function confirmQuiz(qi){
  const qs = getEraQuiz(currentQuizEra);
  const solved = getQuizSolved(currentQuizEra);
  if(solved[qi]) return;
  if(quizPicks[qi] === -1){ quizShake(qi); return; }
  if(quizPicks[qi] === qs[qi].answer-1){          // 정답 → 완료 잠금 + 반짝이
    solved[qi] = true; saveState();
    refreshQuiz(); spawnStars(14);
    if(solved.every(Boolean)) setTimeout(()=>quizPass(currentQuizEra), 700);
  } else {                                         // 오답 → 흔들림 + 선택 초기화(정답 비공개)
    quizPicks[qi] = -1; refreshQuiz(); quizShake(qi);
  }
}

function quizPass(era){
  const isGlobal = (era === "올컴플리트");
  const stKey = isGlobal ? "badge_global" : "badge_"+era;
  if(state[stKey]) return;
  state[stKey] = true; saveState();
  showCategories();                               // 타임라인 복귀(배지=획득 컬러)
  setTimeout(()=>{
    if(isGlobal){ showOverlay(GLOBAL_BADGE.name, GLOBAL_BADGE.desc, GLOBAL_BADGE.icon); }
    else { const cat = CATEGORIES.find(c=>c.key===era); if(cat) showOverlay(cat.name, cat.desc, cat.icon); }
    spawnStars(20);
    checkBadge();                                  // 시대→올컴플리트 활성화 등 후속 체크
  }, 350);
}

// === INIT ===
document.getElementById("nameInput").addEventListener("keydown", e=>{
  if(e.key==="Enter") document.getElementById("codeInput").focus();
});
document.getElementById("codeInput").addEventListener("keydown", e=>{
  if(e.key==="Enter") tryLogin();
});

// 콘텐츠를 외부 JSON에서 로드 (수정 시 JSON만 교체하면 반영됨)
Promise.all([
  fetch('config.json').then(r=>{ if(!r.ok) throw new Error('config.json '+r.status); return r.json(); }),
  fetch('content.json').then(r=>{ if(!r.ok) throw new Error('content.json '+r.status); return r.json(); })
])
  .then(([cfg, data])=>{
    applyConfig(cfg);
    GAME_DATA = data;
    loadState();
    state._lastLevel = getLevel();
    if(state.loggedIn){
      showCategories();
    } else {
      document.getElementById("login").classList.remove("hidden");
    }
  })
  .catch(err=>{
    document.body.innerHTML = '<div style="padding:40px;font-family:monospace">콘텐츠를 불러오지 못했습니다.<br>'+err+'<br><br>※ file:// 이 아니라 로컬/웹 서버에서 열어야 합니다.</div>';
  });
</script>
</body>
