<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Save the Record - 중등용</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#FFFFFF;--accent:#FFD700;--accent2:#FFC107;--text:#222222;--red:#E53935;--green:#43A047;--gray:#BDBDBD;--light:#F5F5F5;--border:#222222;}
body{font-family:'DotGothic16',monospace;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.pixel-font{font-family:'Press Start 2P',monospace;}
.container{max-width:660px;margin:0 auto;padding:20px 18px;min-height:100vh;}
button{font-family:'DotGothic16',monospace;cursor:pointer;border:3px solid var(--border);background:var(--bg);color:var(--text);padding:11px 18px;font-size:16px;transition:background 0.1s;}
button:hover{background:var(--accent);}
button:active{transform:translate(2px,2px);}
input{font-family:'DotGothic16',monospace;border:3px solid var(--border);padding:8px 12px;font-size:16px;outline:none;background:var(--bg);}
input:focus{border-color:var(--accent);}
.hidden{display:none!important;}

/* LOGIN */
#login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;gap:20px;}
#login h1{font-family:'Press Start 2P',monospace;font-size:clamp(18px,5vw,32px);letter-spacing:2px;line-height:1.7;margin:0;}
/* 족자(행잉 스크롤) 타이틀 박스 — 한지(크림) 바탕 + 도트 디자인 */
.title-scroll{display:inline-block;position:relative;padding-top:13px;}
/* 매다는 끈/고리 */
.title-scroll::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:30px;height:15px;border:3px solid #6d4c41;border-bottom:none;border-radius:16px 16px 0 0;}
/* 족자 봉 — 도트(픽셀) 음영 */
.scroll-rod{position:relative;height:18px;width:calc(100% + 36px);margin-left:-18px;border:3px solid #222;z-index:2;
  background:linear-gradient(#FFE9A8 0 5px,#FFD24A 5px 12px,#E0950C 12px 18px);
  box-shadow:inset 4px 0 0 #FFE9A8, inset -4px 0 0 #C57E00;}
/* 봉 양끝 나무 축 */
.scroll-rod::before,.scroll-rod::after{content:"";position:absolute;top:50%;width:16px;height:30px;border:3px solid #222;transform:translateY(-50%);
  background:linear-gradient(#8d6e63 0 50%,#5d4037 50% 100%);}
.scroll-rod::before{left:-17px;}
.scroll-rod::after{right:-17px;}
/* 한지 종이 + 도트 그리드 */
.scroll-body{border:3px solid #222;border-top:none;border-bottom:none;padding:24px 28px;
  background-color:#FBF1D6;
  background-image:radial-gradient(#e6d4a0 1.5px,transparent 1.5px);
  background-size:9px 9px;
  box-shadow:inset 0 0 0 2px #E7D3A0;}
/* 2색 이퀄라이저 타이틀 (골드 계열) */
.neon-title .nc{display:inline-block;animation:neonEq 1.25s ease-in-out infinite;will-change:transform;}
.neon-title .sp{display:inline-block;width:.5em;}
@keyframes neonEq{
  0%,100%{color:#6B3F00;text-shadow:0 1px 0 #fff7df;transform:translateY(0);}
  50%{color:#F2A100;text-shadow:0 1px 0 #fff7df,0 0 6px rgba(242,161,0,.4);transform:translateY(-8px);}
}
#login .subtitle{font-size:20px;color:#555;margin-bottom:16px;overflow:hidden;white-space:nowrap;width:100%;max-width:400px;}
#login .subtitle .marquee{display:inline-block;animation:marquee 6s linear infinite;}
@keyframes marquee{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
#login input{width:260px;text-align:center;font-size:20px;}
#login .error{color:var(--red);font-size:14px;min-height:20px;}
#login button{font-size:18px;padding:13px 36px;background:var(--accent);font-weight:bold;}
.cursor-blink::after{content:'_';animation:blink 0.7s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* TOP BAR */
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:3px solid var(--border);margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.top-bar .level{font-family:'Press Start 2P',monospace;font-size:13px;color:var(--accent2);}
.top-bar .count{font-size:16px;}
.back-btn{font-size:16px;padding:8px 14px;background:var(--light);}
.top-info{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.player-name{font-weight:bold;font-size:15px;color:var(--accent2);}

/* CATEGORIES */
.greeting{font-size:18px;margin-bottom:18px;padding:14px;border:3px solid var(--accent);background:#FFFDE7;}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
@media(max-width:420px){.cat-grid{grid-template-columns:1fr;}}
.cat-btn{text-align:left;padding:14px;font-size:14px;line-height:1.5;position:relative;}
.cat-btn .cat-count{font-size:12px;color:#777;margin-top:4px;}
.cat-btn.completed{border-color:var(--green);background:#E8F5E9;}
.cat-btn.completed::after{content:'\2605';position:absolute;top:6px;right:8px;color:var(--accent);font-size:16px;}

/* BADGES */
.badges-section{margin-top:16px;padding:12px;border:3px solid var(--border);}
.badges-section h3{font-family:'Press Start 2P',monospace;font-size:10px;margin-bottom:10px;}
.badge-list{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.badge-item{display:flex;flex-direction:column;align-items:center;gap:2px;width:64px;}
.badge-img{width:52px;height:52px;image-rendering:pixelated;}
.badge-cap{font-size:9px;color:var(--gray);text-align:center;line-height:1.2;}
.badge-item.earned .badge-cap{color:var(--text);}
.badge-item.locked .badge-img{filter:grayscale(1) brightness(1.15) opacity(0.45);}
/* 좌측 플로팅 배지 스트립 (태블릿: 콘텐츠 좌측 여백 / 폰: 하단 가로) */
.badge-float{position:fixed;top:50%;transform:translateY(-50%);left:max(8px,calc(50% - 330px - 56px));display:flex;flex-direction:column;gap:12px;z-index:500;}
.bf-item{cursor:pointer;line-height:0;}
.bf-img{width:48px;height:48px;image-rendering:pixelated;transition:transform .1s;}
.bf-item:hover .bf-img{transform:scale(1.08);}
.bf-item.locked .bf-img{filter:grayscale(1) brightness(1.15) opacity(0.5);}
@media(max-width:767px){.badge-float{top:auto;bottom:8px;left:50%;transform:translateX(-50%);flex-direction:row;gap:10px;}}

/* HERITAGE LIST */
.heritage-list{display:flex;flex-direction:column;gap:8px;}
.heritage-item{display:flex;justify-content:space-between;align-items:center;padding:14px;border:3px solid var(--border);font-size:16px;}
.heritage-item:hover{background:var(--accent);cursor:pointer;}
.heritage-item .check{color:var(--green);font-size:18px;min-width:24px;text-align:center;}
.heritage-item .pending{color:var(--gray);font-size:18px;min-width:24px;text-align:center;}
.heritage-item .info{flex:1;}
.heritage-item .h-name{font-weight:bold;}
.heritage-item .h-meta{font-size:13px;color:#666;margin-top:2px;}

/* REPORT */
.report-header{padding:12px;border:3px solid var(--accent);background:#FFFDE7;margin-bottom:16px;position:sticky;top:0;z-index:100;}
.report-header h2{font-size:20px;margin-bottom:6px;}
.report-header .meta{font-size:14px;color:#555;}
.report-header .desc{font-size:14px;color:#444;margin-top:8px;line-height:1.6;}
.report-header .report-img{width:100%;max-height:240px;object-fit:contain;border:3px solid var(--border);margin-bottom:10px;background:var(--light);}
.report-progress{font-family:'Press Start 2P',monospace;font-size:11px;text-align:right;margin-bottom:12px;color:var(--accent2);}
.inv-list{display:flex;flex-direction:column;gap:10px;}
.inv-item{border:3px solid var(--border);padding:14px;}
.inv-item.completed{border-color:var(--green);}
.inv-label{font-size:13px;color:#777;margin-bottom:2px;display:flex;align-items:center;gap:6px;}
.inv-label .status-icon{font-size:12px;}
.inv-sublabel{font-weight:bold;font-size:17px;margin-bottom:8px;color:var(--text);}
.inv-content{font-size:16px;line-height:1.7;margin-top:8px;white-space:pre-wrap;}
.inv-connection{margin-top:10px;padding:12px;background:#FFFDE7;border:2px solid var(--accent);font-size:14px;line-height:1.6;}
.inv-connection .conn-title{font-weight:bold;color:var(--accent2);margin-bottom:4px;font-size:12px;}
.code-input-area{margin-top:8px;display:flex;gap:8px;align-items:center;}
.digit-box{width:48px;height:54px;text-align:center;font-size:18px;font-family:'Press Start 2P',monospace;border:3px solid var(--border);}
.digit-box:focus{border-color:var(--accent);background:#FFFDE7;}
.code-submit{padding:11px 18px;font-size:16px;background:var(--accent);font-weight:bold;}
.code-error{color:var(--red);font-size:12px;margin-top:4px;min-height:18px;}
.locked-msg{color:var(--gray);font-size:13px;margin-top:4px;}

/* TOAST */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);padding:13px 28px;border:3px solid var(--border);background:var(--accent);color:#222;font-weight:bold;font-size:15px;z-index:1000;animation:toastIn .25s;max-width:90vw;text-align:center;box-shadow:3px 3px 0 rgba(0,0,0,.2);}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-50%) scale(.9);}to{opacity:1;transform:translate(-50%,-50%) scale(1);}}

/* SHAKE */
@keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-6px);}40%,80%{transform:translateX(6px);}}
.shake{animation:shake 0.4s;}

/* OVERLAY */
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:2000;}
.overlay-box{background:var(--bg);border:4px solid var(--accent);padding:30px 30px 26px;text-align:center;width:460px;max-width:90vw;display:flex;flex-direction:column;align-items:center;}
.overlay-box h2{font-family:'DotGothic16',monospace;font-weight:bold;font-size:22px;color:var(--accent2);margin:0 0 12px;}
.overlay-box p{font-size:15px;line-height:1.7;margin:0 0 22px;min-height:51px;}  /* 2줄 고정 → 배지·레벨 확인버튼 위치 동일 */
.overlay-box button{font-size:14px;padding:10px 26px;}
/* 팝업 미디어 슬롯(배지·레벨 공통 높이) */
.overlay-media{height:132px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
.overlay-img{width:96px;height:auto;image-rendering:pixelated;transform-origin:center;animation:badgeBeat .8s ease-in-out infinite;}  /* 배지: 부드러운 두근두근 */
@keyframes badgeBeat{0%,100%{transform:scale(1);}50%{transform:scale(1.10);}}
.overlay-char{position:relative;width:96px;height:122px;}                 /* 레벨: 2프레임 하드스왑 */
.overlay-char img{position:absolute;left:0;top:0;width:96px;height:auto;image-rendering:pixelated;}
.overlay-char .b{opacity:0;animation:charSwap .8s steps(1,end) infinite;}
@keyframes charSwap{0%,50%{opacity:0;}50.01%,100%{opacity:1;}}

/* COMPLETE OVERLAY */
.complete-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:2500;}
.complete-box{background:var(--bg);border:4px solid var(--accent);padding:24px;text-align:center;width:460px;max-width:90vw;max-height:90vh;overflow-y:auto;}
.complete-box h2{font-family:'DotGothic16',monospace;font-weight:bold;font-size:22px;color:var(--accent2);margin-bottom:16px;line-height:1.4;}
.complete-img{width:100%;max-height:240px;object-fit:contain;border:3px solid var(--border);margin-bottom:14px;background:var(--light);}
.report-header .report-img{cursor:zoom-in;}
.zoomable{position:relative;}
.zoom-hint{position:absolute;right:8px;bottom:8px;background:rgba(0,0,0,0.6);color:#fff;font-size:11px;padding:3px 8px;border-radius:12px;pointer-events:none;}
.img-lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:3500;cursor:zoom-out;padding:24px;}
.img-lightbox img{max-width:96vw;max-height:84vh;object-fit:contain;box-shadow:0 4px 30px rgba(0,0,0,0.6);border-radius:4px;}
.img-lightbox .lb-cap{color:#eee;font-size:13px;margin-top:14px;text-align:center;max-width:90vw;line-height:1.5;}
.img-lightbox .lb-close{position:absolute;top:18px;right:22px;color:#fff;font-size:30px;line-height:1;background:none;border:none;cursor:pointer;}
.complete-name{font-size:20px;font-weight:bold;margin-bottom:6px;}
.complete-meta{font-size:14px;color:#555;margin-bottom:6px;}
.complete-source{font-size:10px;color:var(--gray);margin-bottom:16px;}
.complete-box button{font-size:14px;padding:10px 26px;background:var(--accent);font-weight:bold;}

/* STARS */
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3000;}
.star{position:absolute;width:4px;height:4px;animation:pxTwinkle 1.1s steps(5,end) forwards;}
.star::before{content:"";position:absolute;inset:0;background:currentColor;box-shadow:0 -6px 0 currentColor,0 6px 0 currentColor,-6px 0 0 currentColor,6px 0 0 currentColor;}
@keyframes pxTwinkle{0%{transform:scale(0);opacity:0;}30%{transform:scale(1.4);opacity:1;}65%{transform:scale(1);opacity:1;}100%{transform:scale(.5) translateY(-34px);opacity:0;}}


/* SCROLLBAR */
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-track{background:var(--light);}
::-webkit-scrollbar-thumb{background:var(--gray);border:2px solid var(--light);}

/* TIMELINE */
.timeline-v{position:relative;padding-left:70px;padding-top:6px;padding-bottom:6px;margin-bottom:16px;}
.timeline-v::before{content:'';position:absolute;left:52px;top:0;bottom:0;width:3px;background:var(--border);}
.era-divider{position:relative;margin:14px 0 12px -70px;}
.era-badge{display:inline-block;padding:7px 14px;background:var(--border);color:var(--accent);font-family:'Press Start 2P',monospace;font-size:12px;letter-spacing:1px;}
.tl-item{position:relative;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.tl-year{position:absolute;left:-70px;width:54px;text-align:center;font-family:'Press Start 2P',monospace;font-size:9px;background:var(--accent);border:3px solid var(--border);padding:6px 2px;line-height:1.3;}
.tl-dot{position:absolute;left:-22px;top:50%;transform:translateY(-50%);width:16px;height:16px;background:var(--bg);border:3px solid var(--border);border-radius:50%;z-index:1;}
.tl-dot.done{background:var(--green);}
.tl-card{flex:1;border:3px solid var(--border);padding:13px 15px;background:var(--bg);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px;transition:background 0.1s;}
.tl-card:hover{background:var(--accent);}
.tl-card.done{border-color:var(--green);background:#E8F5E9;}
.tl-card .info{flex:1;}
.tl-card .h-name{font-weight:bold;font-size:16px;}
.tl-card .h-meta{font-size:12px;color:#666;margin-top:3px;}
.tl-card .h-era{display:inline-block;font-size:11px;padding:3px 7px;border:1px solid #999;margin-right:4px;vertical-align:middle;}
.tl-card .h-era.era-고려{background:#FFF3E0;border-color:#E65100;color:#E65100;}
.tl-card .h-era.era-조선{background:#E3F2FD;border-color:#1565C0;color:#1565C0;}
.tl-card .h-era.era-근현대{background:#F3E5F5;border-color:#6A1B9A;color:#6A1B9A;}
.tl-card .check{color:var(--green);font-size:20px;min-width:22px;text-align:center;}
.tl-card .pending{color:var(--gray);font-size:18px;min-width:20px;text-align:center;}
</style>
</head>
<body>
<div class="container">

<!-- LOGIN SCREEN -->
<div id="login">
  <div class="title-scroll">
  <div class="scroll-rod top"></div>
  <div class="scroll-body">
  <h1 class="pixel-font neon-title"><span class="nc" style="animation-delay:0s">S</span><span class="nc" style="animation-delay:.08s">a</span><span class="nc" style="animation-delay:.16s">v</span><span class="nc" style="animation-delay:.24s">e</span><span class="sp"></span><span class="nc" style="animation-delay:.32s">t</span><span class="nc" style="animation-delay:.40s">h</span><span class="nc" style="animation-delay:.48s">e</span><br><span class="nc" style="animation-delay:.56s">R</span><span class="nc" style="animation-delay:.64s">e</span><span class="nc" style="animation-delay:.72s">c</span><span class="nc" style="animation-delay:.80s">o</span><span class="nc" style="animation-delay:.88s">r</span><span class="nc" style="animation-delay:.96s">d</span></h1>
  </div>
  <div class="scroll-rod bottom"></div>
  </div>
  <div class="subtitle"><span class="marquee">기록을 저장하라. 기록을 구하라.</span></div>
  <input type="text" id="nameInput" placeholder="이름 입력" maxlength="5" autocomplete="off">
  <input type="text" id="codeInput" placeholder="수업 코드 입력" maxlength="10" autocomplete="off">
  <div class="error" id="loginError"></div>
  <button onclick="tryLogin()">로그인</button>
</div>

<!-- CATEGORIES SCREEN -->
<div id="categories" class="hidden">
  <div class="top-bar">
    <div class="top-info">
      <div class="player-name" id="playerName"></div>
      <div class="level" id="levelDisplay"></div>
      <div class="count" id="countDisplay"></div>
    </div>
    <button class="back-btn" onclick="showResult()">종료</button>
  </div>
  <div class="greeting">기록관님, 탐사할 유산을 선택하세요.</div>
  <div class="timeline-v" id="timelineList"></div>
  <div class="badge-float" id="badgeFloat"></div>
</div>

<!-- HERITAGE LIST SCREEN -->
<div id="heritageList" class="hidden">
  <div class="top-bar">
    <button class="back-btn" onclick="showCategories()">< 시대 선택</button>
    <div class="level" id="levelDisplay2"></div>
  </div>
  <h2 id="catTitle" style="font-size:18px;margin-bottom:14px;"></h2>
  <div class="heritage-list" id="hList"></div>
</div>

<!-- REPORT SCREEN -->
<div id="report" class="hidden">
  <div class="top-bar">
    <button class="back-btn" onclick="showCategories()">< 타임라인</button>
    <div class="report-progress" id="reportProgress"></div>
  </div>
  <div class="report-header">
    <div class="zoomable"><img class="report-img" id="reportImg" src="" alt="" onclick="openLightbox(this)"><span class="zoom-hint">🔍 탭하면 크게</span></div>
    <h2 id="reportName"></h2>
    <div class="meta" id="reportMeta"></div>
    <div class="desc" id="reportDesc"></div>
  </div>
  <div class="inv-list" id="invList"></div>
</div>

<!-- RESULT SCREEN (placeholder — 추후 '획득 뱃지 설명' 기획) -->
<div id="result" class="hidden">
  <div class="top-bar">
    <div class="level">RESULT</div>
  </div>
  <div class="greeting" style="text-align:center;">
    <span id="resultName"></span>탐사를 종료했습니다.<br>
    <span style="font-size:13px;color:#777;">※ 결과화면(획득 뱃지 설명)은 준비 중입니다.</span>
  </div>
  <div style="text-align:center;margin-top:24px;">
    <button onclick="logout()">처음으로</button>
  </div>
</div>

</div>

<!-- OVERLAY -->
<div class="overlay hidden" id="overlay">
  <div class="overlay-box">
    <div class="overlay-media" id="overlayMedia"></div>
    <h2 id="overlayTitle"></h2>
    <p id="overlayMsg"></p>
    <button onclick="hideOverlay()">확인</button>
  </div>
</div>

<!-- COMPLETE OVERLAY -->
<div class="complete-overlay hidden" id="completeOverlay">
  <div class="complete-box">
    <h2>기록 완성!</h2>
    <img class="complete-img" id="completeImg" src="" alt="">
    <div class="complete-name" id="completeName"></div>
    <div class="complete-meta" id="completeMeta"></div>
    <div class="complete-source" id="completeSource"></div>
    <button onclick="closeComplete()">확인</button>
  </div>
</div>

<!-- IMAGE LIGHTBOX (클릭 확대) -->
<div class="img-lightbox hidden" id="imgLightbox" onclick="closeLightbox(event)">
  <button class="lb-close" onclick="closeLightbox(event)" aria-label="닫기">&times;</button>
  <img id="lightboxImg" src="" alt="">
  <div class="lb-cap" id="lightboxCap"></div>
</div>

<!-- STARS CONTAINER -->
<div class="stars hidden" id="starsContainer"></div>

<script>
// === GAME DATA ===
let GAME_DATA = [];  // content.json 에서 로드

// 아래 설정값은 config.json(엑셀 levels/badges/sections 시트)에서 로드 — applyConfig() 참조.
let CATEGORIES = [];   // 시대별 뱃지 (badges type=category)
let INV_LABELS = [];   // 6개 조사 항목 (sections)
let LEVELS = [];       // 레벨 단계 (levels)
let GLOBAL_BADGE = {emoji:"", name:"", desc:""};  // 전체 완주 뱃지 (badges type=global)

function applyConfig(cfg){
  LEVELS = (cfg.levels||[]).map(l=>({min:l.min, name:l.name, icon:l.icon||"", iconB:l.icon_b||""}));
  INV_LABELS = (cfg.sections||[]).map(s=>({key:s.key, sub:s.sub}));
  CATEGORIES = (cfg.badges||[]).filter(b=>b.type==="category")
    .map(b=>({key:b.key, badge:(b.emoji?b.emoji+" ":"")+b.name, name:b.name, desc:b.desc, icon:b.icon||""}));
  const g = (cfg.badges||[]).find(b=>b.type==="global");
  if(g) GLOBAL_BADGE = {emoji:g.emoji, name:g.name, desc:g.desc, icon:g.icon||""};
}

// === STATE ===
let state = {completed:{}, loggedIn:false};
let currentCategory = "";
let currentHeritage = null;

function loadState(){
  try{
    const s = localStorage.getItem("save_the_record_elem_state");
    if(s) state = JSON.parse(s);
  }catch(e){}
}
function saveState(){
  localStorage.setItem("save_the_record_elem_state", JSON.stringify(state));
}

function markItemCompleted(no, key){
  if(!state.completed[no]) state.completed[no] = {};
  state.completed[no][key] = true;
  saveState();
}

function isItemCompleted(no, key){
  return !!(state.completed[no] && state.completed[no][key]);
}

function getCompletedItems(no){
  if(!state.completed[no]) return [];
  return Object.keys(state.completed[no]);
}

function isHeritageComplete(no){
  return getCompletedItems(no).length >= 6;
}

function getCompletedHeritageCount(){
  let c = 0;
  GAME_DATA.forEach(d=>{if(isHeritageComplete(d.no)) c++;});
  return c;
}

function getLevel(){
  const count = getCompletedHeritageCount();
  let lvl = 1;
  for(let i = LEVELS.length - 1; i >= 0; i--){
    if(count >= LEVELS[i].min){lvl = i + 1; break;}
  }
  return lvl;
}

function getLevelName(){
  return LEVELS[getLevel()-1].name;
}

function getCatItems(catKey){
  return GAME_DATA.filter(d => d.category === catKey);
}

function isCatComplete(catKey){
  const items = getCatItems(catKey);
  return items.length > 0 && items.every(d => isHeritageComplete(d.no));
}

// === UI HELPERS ===
function showToast(msg, type, dur){
  const t = document.createElement("div");
  t.className = "toast " + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), dur || 2500);
}

let overlayQueue = [];
// kind: "badge"(기본, images/badges/, 두근두근 펄스) | "level"(images/levels/, 2프레임 icon+iconB)
function showOverlay(title, msg, icon, kind, iconB){
  overlayQueue.push({title:title, msg:msg, icon:icon, kind:kind||"badge", iconB:iconB||""});  // 동시 획득 시 순차 표시
  if(document.getElementById("overlay").classList.contains("hidden")) renderOverlay();
}
function renderOverlay(){
  const it = overlayQueue[0];
  if(!it) return;
  const media = document.getElementById("overlayMedia");
  if(it.kind === "level" && it.icon){     // 레벨: 2프레임 캐릭터(하드스왑)
    media.innerHTML = '<div class="overlay-char"><img class="a" src="images/levels/'+it.icon+'" alt="">'
      + (it.iconB ? '<img class="b" src="images/levels/'+it.iconB+'" alt="">' : '') + '</div>';
    media.style.display = "";
  } else if(it.icon){                     // 배지: 단일 이미지 + 두근두근 펄스
    media.innerHTML = '<img class="overlay-img" src="images/badges/'+it.icon+'" alt="">';
    media.style.display = "";
  } else { media.innerHTML = ""; media.style.display = "none"; }
  document.getElementById("overlayTitle").textContent = it.title;
  // 문장별 줄바꿈 (. ! ? 뒤에서 끊기)
  const safe = (it.msg||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  document.getElementById("overlayMsg").innerHTML = safe.replace(/([.!?])\s+/g, "$1<br>");
  document.getElementById("overlay").classList.remove("hidden");
}

function hideOverlay(){
  document.getElementById("overlay").classList.add("hidden");
  overlayQueue.shift();
  if(overlayQueue.length) setTimeout(renderOverlay, 300);
}

function spawnStars(count){
  const c = document.getElementById("starsContainer");
  c.classList.remove("hidden");
  c.innerHTML = "";
  const PAL = ["#FFD700","#FFC107","#FF8F00","#E53935","#43A047","#4A78C8"];
  for(let i = 0; i < count; i++){
    const s = document.createElement("div");
    s.className = "star";
    s.style.left = (Math.random()*86+7)+"%";
    s.style.top = (Math.random()*60+12)+"%";
    s.style.color = PAL[Math.floor(Math.random()*PAL.length)];
    s.style.animationDelay = (Math.random()*1.2)+"s";
    c.appendChild(s);
  }
  setTimeout(()=>{c.classList.add("hidden");c.innerHTML="";}, 2600);
}


// === SCREENS ===
function hideAll(){
  ["login","categories","heritageList","report","result"].forEach(id=>{
    document.getElementById(id).classList.add("hidden");
  });
}

// 이름: 입력 전체 보관(최대 5자), 헤더에는 앞 3글자만 노출.
function getPlayerName(){ return state.playerName || ""; }
function getPlayerNameShort(){ return getPlayerName().slice(0,3); }

function tryLogin(){
  const name = document.getElementById("nameInput").value.trim();
  const code = document.getElementById("codeInput").value.trim();
  if(!name){
    document.getElementById("loginError").textContent = "이름을 입력해주세요.";
    document.getElementById("nameInput").classList.add("shake");
    setTimeout(()=>document.getElementById("nameInput").classList.remove("shake"),400);
    return;
  }
  if(code === "하이러닝"){
    state.loggedIn = true;
    state.playerName = name;
    saveState();
    showCategories();
  } else {
    document.getElementById("loginError").textContent = "코드가 올바르지 않습니다.";
    document.getElementById("codeInput").classList.add("shake");
    setTimeout(()=>document.getElementById("codeInput").classList.remove("shake"),400);
  }
}

function logout(){
  state.loggedIn = false;
  state.playerName = "";
  saveState();
  hideAll();
  document.getElementById("login").classList.remove("hidden");
  document.getElementById("nameInput").value = "";
  document.getElementById("codeInput").value = "";
  document.getElementById("loginError").textContent = "";
}

// 종료 → 결과화면(현재 placeholder, 추후 '획득 뱃지 설명' 기획). 진행상황 데이터는 보존.
function showResult(){
  hideAll();
  const nm = getPlayerName();
  document.getElementById("resultName").textContent = nm ? nm+" 기록관님, " : "";
  document.getElementById("result").classList.remove("hidden");
}

function showCategories(){
  hideAll();
  document.getElementById("categories").classList.remove("hidden");
  const lvl = getLevel();
  const hCount = getCompletedHeritageCount();
  const short = getPlayerNameShort();
  document.getElementById("playerName").textContent = short;
  document.getElementById("levelDisplay").textContent = "Lv."+lvl+" "+getLevelName();
  document.getElementById("countDisplay").textContent = "완료: "+hCount+"/12건";

  const tl = document.getElementById("timelineList");
  tl.innerHTML = "";
  const sorted = GAME_DATA.slice().sort((a,b)=>a.created-b.created);
  let lastEra = "";
  sorted.forEach(d=>{
    if(d.category !== lastEra){
      const div = document.createElement("div");
      div.className = "era-divider";
      div.innerHTML = '<span class="era-badge">'+d.category+'</span>';
      tl.appendChild(div);
      lastEra = d.category;
    }
    const done = isHeritageComplete(d.no);
    const row = document.createElement("div");
    row.className = "tl-item";
    row.innerHTML =
      '<span class="tl-year">'+d.era_label+'</span>' +
      '<span class="tl-dot'+(done?" done":"")+'"></span>' +
      '<div class="tl-card'+(done?" done":"")+'">' +
        '<div class="info">' +
          '<div class="h-name">'+d.name+'</div>' +
          '<div class="h-meta"><span class="h-era era-'+d.category+'">'+d.category+'</span>UNESCO '+d.year+'년 등재 · '+getCompletedItems(d.no).length+'/6</div>' +
        '</div>' +
        '<span class="'+(done?"check":"pending")+'">'+(done?"✓":"○")+'</span>' +
      '</div>';
    row.querySelector(".tl-card").onclick = ()=>showReport(d.no);
    tl.appendChild(row);
  });

  const bl = document.getElementById("badgeFloat");
  bl.innerHTML = "";
  const allDone = CATEGORIES.every(c=>isCatComplete(c.key));
  const list = CATEGORIES.map(cat=>({icon:cat.icon, name:cat.name, desc:cat.desc, earned:isCatComplete(cat.key)}));
  list.push({icon:GLOBAL_BADGE.icon, name:GLOBAL_BADGE.name, desc:GLOBAL_BADGE.desc, earned:allDone});
  list.forEach(it=>{
    const b = document.createElement("div");
    b.className = "bf-item"+(it.earned?" earned":" locked");
    b.title = it.name;
    b.innerHTML = it.icon ? '<img class="bf-img" src="images/badges/'+it.icon+'" alt="'+it.name+'">' : '';
    b.onclick = ()=> it.earned
      ? showOverlay(it.name, it.desc, it.icon)
      : showOverlay(it.name, "아직 획득하지 못한 배지예요.");
    bl.appendChild(b);
  });
}

function showHeritage(catKey){
  hideAll();
  currentCategory = catKey;
  document.getElementById("heritageList").classList.remove("hidden");
  document.getElementById("levelDisplay2").textContent = "Lv."+getLevel()+" "+getLevelName();
  document.getElementById("catTitle").textContent = catKey;

  const list = document.getElementById("hList");
  list.innerHTML = "";
  const items = getCatItems(catKey);
  items.forEach(d=>{
    const div = document.createElement("div");
    div.className = "heritage-item";
    const done = isHeritageComplete(d.no);
    const doneCount = getCompletedItems(d.no).length;
    div.innerHTML = '<div class="info"><div class="h-name">'+d.name+'</div><div class="h-meta">'+d.country+' | '+d.year+'년 | '+doneCount+'/6</div></div><div class="'+(done?"check":"pending")+'">'+(done?"\u2713":"\u25CB")+'</div>';
    div.onclick = ()=>showReport(d.no);
    list.appendChild(div);
  });
}

function showReport(no){
  hideAll();
  document.getElementById("report").classList.remove("hidden");
  currentHeritage = no;
  const d = GAME_DATA.find(x=>x.no===no);
  const noStr = String(d.no).padStart(2,"0");
  document.getElementById("reportImg").src = "images/"+noStr+".jpg";
  document.getElementById("reportImg").alt = d.name;
  document.getElementById("reportName").textContent = d.name;
  document.getElementById("reportMeta").textContent = d.country+" | UNESCO "+d.year+"년 등재";
  document.getElementById("reportDesc").textContent = d.desc || "";

  renderInvList(d);
}

function renderInvList(d){
  const doneCount = getCompletedItems(d.no).length;
  document.getElementById("reportProgress").textContent = doneCount+"/6 완료";

  const list = document.getElementById("invList");
  list.innerHTML = "";

  INV_LABELS.forEach(inv=>{
    const item = d.items[inv.key];
    if(!item) return;
    const completed = isItemCompleted(d.no, inv.key);
    const isWeb = item.method === "웹제공";

    const div = document.createElement("div");
    div.className = "inv-item"+(completed?" completed":"");

    let html = '<div class="inv-label"><span class="status-icon">'+(completed?"\u2713":(isWeb?"\u25C9":"\u25CB"))+'</span> '+inv.key+'</div>';
    html += '<div class="inv-sublabel">'+inv.sub+'</div>';

    if(isWeb && !completed){
      // Auto-complete web items on view
      markItemCompleted(d.no, inv.key);
      div.className = "inv-item completed";
      html = '<div class="inv-label"><span class="status-icon">\u2713</span> '+inv.key+'</div>';
      html += '<div class="inv-sublabel">'+inv.sub+'</div>';
    }

    if(isWeb || completed){
      html += '<div class="inv-content" id="content_'+d.no+'_'+inv.key.replace(/[^a-zA-Z가-힣]/g,"")+'">'+item.content+'</div>';
      if(!isWeb && item.connection){
        html += '<div class="inv-connection"><div class="conn-title">📔 Point</div>'+item.connection+'</div>';
      }
    } else {
      html += '<div class="locked-msg">\uD83D\uDD12 카드 코드를 입력하세요</div>';
      html += '<div class="code-input-area">';
      html += '<input class="digit-box" type="tel" maxlength="1" data-no="'+d.no+'" data-key="'+inv.key+'" data-pos="0" oninput="digitInput(this)" onkeydown="digitKeydown(event,this)">';
      html += '<input class="digit-box" type="tel" maxlength="1" data-no="'+d.no+'" data-key="'+inv.key+'" data-pos="1" oninput="digitInput(this)" onkeydown="digitKeydown(event,this)">';
      html += '<input class="digit-box" type="tel" maxlength="1" data-no="'+d.no+'" data-key="'+inv.key+'" data-pos="2" oninput="digitInput(this)" onkeydown="digitKeydown(event,this)">';
      html += '<button class="code-submit" onclick="submitCode('+d.no+',\''+inv.key.replace(/'/g,"\\'")+'\')">확인</button>';
      html += '</div>';
      html += '<div class="code-error" id="err_'+d.no+'_'+inv.key.replace(/[^a-zA-Z가-힣]/g,"")+'"></div>';
    }

    div.innerHTML = html;
    list.appendChild(div);
  });

  // Check if just completed all web items
  checkAutoComplete(d);
}

function checkAutoComplete(d){
  const doneCount = getCompletedItems(d.no).length;
  document.getElementById("reportProgress").textContent = doneCount+"/6 완료";
  if(doneCount >= 6 && !d._celebrated){
    d._celebrated = true;
    setTimeout(()=>{
      spawnStars(20);
      showCompleteOverlay(d);
      checkLevelUp(d);
      checkBadge(d);
    }, 300);
  }
}

// 이미지 클릭 확대(라이트박스) — 기록물 디테일을 학생이 읽을 수 있게
function openLightbox(imgEl){
  if(!imgEl || !imgEl.src) return;
  document.getElementById("lightboxImg").src = imgEl.src;
  var cap = imgEl.alt || "";
  document.getElementById("lightboxCap").textContent = cap;
  document.getElementById("imgLightbox").classList.remove("hidden");
}
function closeLightbox(e){
  if(e) e.stopPropagation();
  document.getElementById("imgLightbox").classList.add("hidden");
}
document.addEventListener("keydown", function(e){
  if(e.key === "Escape") closeLightbox();
});

function showCompleteOverlay(d){
  const no = String(d.no).padStart(2,"0");
  document.getElementById("completeImg").src = "images/"+no+".jpg";
  document.getElementById("completeImg").alt = d.name;
  document.getElementById("completeName").textContent = d.name;
  document.getElementById("completeMeta").textContent = d.country+" | UNESCO 세계기록유산 "+d.year+"년 등재";
  document.getElementById("completeSource").textContent = d.source || "사진 출처 확인 중";
  document.getElementById("completeOverlay").classList.remove("hidden");
}

function closeComplete(){
  document.getElementById("completeOverlay").classList.add("hidden");
  // 타임라인에서 바로 보고서로 진입하면 currentCategory가 비어 있으므로,
  // 빈 카테고리 화면 대신 항상 타임라인(메인)으로 복귀한다.
  if(currentCategory){ showHeritage(currentCategory); } else { showCategories(); }
}

function digitInput(el){
  const v = el.value.replace(/[^0-9]/g,"");
  el.value = v.slice(0,1);
  if(v.length > 0){
    const pos = parseInt(el.dataset.pos);
    const siblings = el.parentElement.querySelectorAll(".digit-box");
    if(pos < 2) siblings[pos+1].focus();
  }
}

function digitKeydown(e, el){
  if(e.key === "Backspace" && el.value === ""){
    const pos = parseInt(el.dataset.pos);
    if(pos > 0){
      const siblings = el.parentElement.querySelectorAll(".digit-box");
      siblings[pos-1].focus();
    }
  }
  if(e.key === "Enter"){
    submitCode(parseInt(el.dataset.no), el.dataset.key);
  }
}

function submitCode(no, key){
  const d = GAME_DATA.find(x=>x.no===no);
  const item = d.items[key];
  const area = document.querySelector('.code-input-area');
  if(!area) return;

  // Find the right code input area
  const allAreas = document.querySelectorAll('.code-input-area');
  let targetArea = null;
  allAreas.forEach(a=>{
    const inputs = a.querySelectorAll('.digit-box');
    if(inputs.length && inputs[0].dataset.no == no && inputs[0].dataset.key === key){
      targetArea = a;
    }
  });
  if(!targetArea) return;

  const digits = targetArea.querySelectorAll(".digit-box");
  const code = Array.from(digits).map(d=>d.value).join("");

  const errId = "err_"+no+"_"+key.replace(/[^a-zA-Z가-힣]/g,"");
  const errEl = document.getElementById(errId);

  if(code.length < 3){
    if(errEl) errEl.textContent = "3자리를 모두 입력하세요.";
    return;
  }

  if(code === item.code){
    markItemCompleted(no, key);
    if(errEl) errEl.textContent = "";
    showToast("기록 저장 성공!", "success", 2000);
    spawnStars(20);
    renderInvList(d);
    checkLevelUp(d);
    checkBadge(d);
  } else {
    if(errEl) errEl.textContent = "코드가 틀렸습니다.";
    targetArea.classList.add("shake");
    setTimeout(()=>targetArea.classList.remove("shake"),400);
  }
}

function checkLevelUp(d){
  const prevLevel = state._lastLevel || 1;
  const curLevel = getLevel();
  if(curLevel > prevLevel){
    state._lastLevel = curLevel;
    saveState();
    setTimeout(()=>{
      showOverlay("Lv."+curLevel+" "+getLevelName(), "축하합니다!", LEVELS[curLevel-1].icon, "level", LEVELS[curLevel-1].iconB);
      spawnStars(20);
    }, 500);
  }
  state._lastLevel = curLevel;
}

function checkBadge(d){
  CATEGORIES.forEach(cat=>{
    if(isCatComplete(cat.key)){
      const bKey = "badge_"+cat.key;
      if(!state[bKey]){
        state[bKey] = true;
        saveState();
        setTimeout(()=>{
          showOverlay(cat.name, cat.desc, cat.icon);
          spawnStars(20);
        }, 800);
      }
    }
  });
  // Check global
  const allDone = CATEGORIES.every(c=>isCatComplete(c.key));
  if(allDone && !state.badge_global){
    state.badge_global = true;
    saveState();
    setTimeout(()=>{
      showOverlay(GLOBAL_BADGE.name, GLOBAL_BADGE.desc, GLOBAL_BADGE.icon);
      spawnStars(20);
    }, 1500);
  }
}

// === INIT ===
document.getElementById("nameInput").addEventListener("keydown", e=>{
  if(e.key==="Enter") document.getElementById("codeInput").focus();
});
document.getElementById("codeInput").addEventListener("keydown", e=>{
  if(e.key==="Enter") tryLogin();
});

// 콘텐츠를 외부 JSON에서 로드 (수정 시 JSON만 교체하면 반영됨)
Promise.all([
  fetch('config.json').then(r=>{ if(!r.ok) throw new Error('config.json '+r.status); return r.json(); }),
  fetch('content.json').then(r=>{ if(!r.ok) throw new Error('content.json '+r.status); return r.json(); })
])
  .then(([cfg, data])=>{
    applyConfig(cfg);
    GAME_DATA = data;
    loadState();
    state._lastLevel = getLevel();
    if(state.loggedIn){
      showCategories();
    } else {
      document.getElementById("login").classList.remove("hidden");
    }
  })
  .catch(err=>{
    document.body.innerHTML = '<div style="padding:40px;font-family:monospace">콘텐츠를 불러오지 못했습니다.<br>'+err+'<br><br>※ file:// 이 아니라 로컬/웹 서버에서 열어야 합니다.</div>';
  });
</script>
